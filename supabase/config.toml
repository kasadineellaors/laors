# LAORS Supabase — link with: npx supabase link --project-ref YOUR_PROJECT_REF

project_id = "laors"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback", "http://localhost:3000/auth/confirm"]

[auth.email]
enable_signup = true
enable_confirmations = false
